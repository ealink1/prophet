<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>菩提苑 · 为家人祈福求灵签</title>
<meta name="description" content="心诚则灵。为家人点一盏祈福灯，求一支关帝灵签，看一卦命理八字。一念慈悲，福报自来。">
<meta name="theme-color" content="#1a1410">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/favicon.svg">
<style>
@font-face{font-family:'ZhiMangXing';font-style:normal;font-weight:400;font-display:block;src:url('/static/fonts/ZhiMangXing-subset.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
:root{
--xuan:#1a1410;--xuan-card:#231c14;--xuan-surface:#2c2318;
--gold:#c9a05c;--gold-light:#f5e6b8;--gold-dark:#8b6914;
--vermillion:#c43d3d;--vermillion-light:#e05555;
--paper:#f5f0e8;--paper-dark:#b8a88a;--paper-warm:#f0e8d8;
--emerald:#10b981;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--xuan);color:var(--paper);min-height:100vh;overflow-x:hidden}
.font-display{font-family:'ZhiMangXing',cursive}
.text-gold{color:var(--gold)}.bg-gold{background:var(--gold)}
.text-vermillion{color:var(--vermillion)}.text-emerald{color:var(--emerald)}

/* 背景 */
#bg{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,var(--xuan) 0%,var(--xuan-card) 50%,var(--xuan) 100%)}
#bg-img{position:fixed;inset:0;z-index:0;background:url('/static/images/temple-mountain.svg') center/cover no-repeat;opacity:.15}
#bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,rgba(10,6,4,.55) 0%,rgba(10,6,4,.35) 30%,transparent 60%,rgba(10,6,4,.6) 100%)}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(201,160,92,.35);animation:rise 5s infinite}
@keyframes rise{0%{transform:translateY(0);opacity:.35}50%{opacity:.6}100%{transform:translateY(-100vh);opacity:0}}

/* 导航 */
.header{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;transition:all .3s}
.header.scrolled{background:rgba(26,20,16,.95);backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(201,169,110,.12)}
.header-inner{max-width:1200px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo svg{width:36px;height:36px;color:var(--gold);filter:drop-shadow(0 0 8px rgba(201,160,94,.4))}
.logo-text{font-size:1.5rem;background:linear-gradient(180deg,#f5e6b8,#c9a05c 50%,#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.12em;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.nav-links{display:flex;gap:20px}
.nav-links a{color:var(--paper-dark);text-decoration:none;font-size:14px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);opacity:0;transition:opacity .3s}
.header.scrolled .gold-divider{opacity:.3}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;border-top:1px solid rgba(201,160,92,.2);background:rgba(35,28,20,.97);backdrop-filter:blur(12px);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--paper-dark);font-size:11px;padding:4px 8px;border-radius:6px;transition:color .2s}
.bottom-nav a.active{color:var(--gold)}
.bottom-nav svg{width:20px;height:20px}

/* 内容 */
.main{position:relative;z-index:10;padding:72px 16px 96px;max-width:800px;margin:0 auto}

/* 卡片 */
.card{background:rgba(35,28,20,.95);border:1px solid rgba(201,160,92,.2);border-radius:12px;padding:24px;backdrop-filter:blur(4px);transition:border-color .3s}
.card:hover{border-color:rgba(201,160,92,.3)}
.card+.card{margin-top:16px}

/* 按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--vermillion);color:#fff;min-width:180px}
.btn-primary:hover{background:var(--vermillion-light)}
.btn-secondary{background:transparent;color:var(--gold);border:1px solid rgba(201,160,92,.4)}
.btn-secondary:hover{border-color:rgba(201,160,92,.6);background:rgba(201,160,92,.1)}
.btn-gold{background:var(--gold);color:var(--xuan)}
.btn-gold:hover{background:var(--gold-light)}

/* 表单 */
input,select,textarea{width:100%;padding:12px;background:rgba(44,35,24,.6);border:1px solid rgba(201,160,92,.2);border-radius:8px;color:var(--paper);font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(201,160,92,.5)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:14px;color:var(--paper-dark);margin-bottom:6px}

/* 标签 */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.badge-gold{border:1px solid rgba(201,160,92,.4);background:rgba(201,160,92,.1);color:var(--gold)}
.badge-vermillion{border:1px solid rgba(196,61,61,.4);background:rgba(196,61,61,.1);color:var(--vermillion-light)}
.badge-emerald{border:1px solid rgba(16,185,129,.4);background:rgba(16,185,129,.1);color:var(--emerald)}

/* 灵签等级颜色 */
.level-shangshang,.level-shangji{color:var(--vermillion-light)}
.level-zhongji{color:var(--gold)}
.level-zhongping{color:var(--paper)}
.level-xiaxia{color:var(--paper-dark)}

/* 音乐播放器 */
.player-bar{position:fixed;bottom:60px;left:12px;right:12px;z-index:35;background:rgba(35,28,20,.95);border:1px solid rgba(201,160,92,.4);border-radius:16px;padding:8px 12px;backdrop-filter:blur(12px);display:none}
.player-bar.show{display:flex;align-items:center;gap:12px}
.player-icon{width:48px;height:48px;border-radius:50%;border:1px solid rgba(201,160,92,.4);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-title{font-size:14px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-subtitle{font-size:11px;color:var(--paper-dark);opacity:.7}
.player-progress{height:3px;background:rgba(44,35,24,.6);border-radius:2px;margin-top:4px;overflow:hidden}
.player-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--vermillion));transition:width .3s}
.player-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(201,160,92,.4);background:rgba(201,160,92,.1);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* 黄历特殊样式 */
.almanac-header{text-align:center;padding:16px 0}
.almanac-date{font-size:2rem;background:linear-gradient(180deg,#f5e6b8,#c9a05c 50%,#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.level-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 24px;border-radius:24px;font-size:1rem;margin:16px 0}
.yi-ji-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.yi-card{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:16px}
.ji-card{background:rgba(196,61,61,.05);border:1px solid rgba(196,61,61,.3);border-radius:12px;padding:16px}
.tag{display:inline-block;padding:4px 12px;border-radius:16px;font-size:13px;margin:4px}
.tag-yi{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.tag-ji{background:rgba(196,61,61,.1);border:1px solid rgba(196,61,61,.3);color:var(--vermillion-light)}
.shichen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
.shichen-item{background:rgba(44,35,24,.4);border:1px solid rgba(201,160,92,.15);border-radius:8px;padding:12px;text-align:center}
.shichen-name{font-size:16px;color:var(--gold)}
.shichen-luck{font-size:12px;margin-top:4px}
.shichen-luck.ji{color:var(--emerald)}.shichen-luck.xiong{color:var(--vermillion)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
.week-item{text-align:center;padding:8px 4px;border-radius:8px;border:2px solid rgba(201,160,92,.2);cursor:pointer;transition:all .2s}
.week-item.active{border-color:var(--gold);background:rgba(201,160,92,.15)}
.week-item:hover{border-color:rgba(201,160,92,.5)}

/* 师父选择 */
.master-grid{display:grid;gap:12px;margin:16px 0}
.master-card{display:flex;gap:12px;padding:16px;border-radius:12px;border:2px solid rgba(201,160,92,.2);cursor:pointer;transition:all .2s}
.master-card.selected{border-color:var(--gold);background:rgba(201,160,92,.1)}
.master-emoji{font-size:2rem;width:56px;text-align:center}
.master-name{font-size:16px;font-weight:600}
.master-role{font-size:12px;color:var(--paper-dark)}
.master-desc{font-size:13px;color:var(--paper-dark);margin-top:4px}

/* 音乐列表 */
.track-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.track-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:1px solid rgba(201,160,92,.15);cursor:pointer;transition:all .2s}
.track-item:hover,.track-item.playing{border-color:rgba(201,160,92,.4);background:rgba(201,160,92,.05)}
.track-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.track-info{flex:1;min-width:0}
.track-title{font-size:15px;color:var(--paper)}
.track-subtitle{font-size:12px;color:var(--paper-dark);opacity:.7}
.track-duration{font-size:12px;color:var(--paper-dark)}

/* 赚按钮 */
.earn-btn{position:fixed;right:12px;bottom:100px;z-index:40;width:56px;height:56px;border-radius:50%;border:1px solid rgba(201,160,92,.5);background:linear-gradient(135deg,rgba(201,160,92,.35),rgba(201,160,92,.2),rgba(196,61,61,.2));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(201,160,92,.2);backdrop-filter:blur(8px)}
.earn-btn span{font-size:22px;color:var(--gold);text-shadow:0 0 10px rgba(201,162,39,.35)}

/* 加载 */
.loading{text-align:center;padding:60px;color:var(--paper-dark);opacity:.65}

/* 响应式 */
@media(max-width:768px){
  .nav-links{display:none}
  .bottom-nav{display:flex}
}
@media(min-width:769px){
  .bottom-nav{display:none}
  .earn-btn{bottom:16px}
  .player-bar{bottom:16px;left:auto;right:16px;max-width:384px}
}
@media(min-width:769px){
  .yi-ji-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .yi-ji-grid{grid-template-columns:1fr}
  .week-grid{grid-template-columns:repeat(7,1fr)}
}
</style>
</head>
<body>

<div id="bg-img"></div>
<div id="bg-glow"></div>

<header class="header" id="header">
  <div class="header-inner">
    <a class="logo" href="#/" onclick="navigate('/')">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M32 6 C 22 6, 12 12, 10 22 C 8 32, 14 44, 24 50 C 28 53, 30 56, 31 60 L 32 62 L 33 60 C 34 56, 36 53, 40 50 C 50 44, 56 32, 54 22 C 52 12, 42 6, 32 6 Z" fill="currentColor" fill-opacity=".12"/>
        <path d="M32 8 V 60" stroke-width="1.4"/>

<div class="player-bar" id="playerBar">

  <a href="#/qifu" onclick="navigate('/qifu')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg><span>祈福</span></a>

<script>
const API = '/api/v1';
let currentRoute = '/';
let authToken = localStorage.getItem('token');
let tracks = [];
let currentTrack = null;
let isPlaying = false;
const audio = document.getElementById('audioEl');

// ============ Init ============
(async function init() {
  initParticles();
  initScrollHeader();
  if (!authToken) {
    const did = localStorage.getItem('device_id') || 'web_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
    localStorage.setItem('device_id', did);
    const res = await api('/auth/anonymous/init', { device_id: did });
    if (res && res.token) {
      authToken = res.token;
      localStorage.setItem('token', res.token);
      localStorage.setItem('user', JSON.stringify(res.user));
    }
  }
  const catalog = await api('/meditation/catalog');
  if (catalog && catalog.tracks) tracks = catalog.tracks;
  navigate(window.location.hash.slice(1) || '/');
})();

function initParticles() {
  const el = document.getElementById('particles');
  const positions = [{l:12,t:20},{l:32,t:65},{l:55,t:38},{l:72,t:72},{l:85,t:28},{l:20,t:82}];
  positions.forEach((p, i) => {
    const s = document.createElement('span');
    s.className = 'particle';
    s.style.cssText = `left:${p.l}%;top:${p.t}%;animation-delay:${i*.8}s;animation-duration:${4+i}s`;
    el.appendChild(s);
  });
}

function initScrollHeader() {
  window.addEventListener('scroll', () => {
    document.getElementById('header').classList.toggle('scrolled', window.scrollY > 20);
  });
}

// ============ API ============
async function api(path, body) {
  const headers = {'Content-Type':'application/json'};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  try {
    const r = await fetch(API + path, {method:'POST', headers, body: body ? JSON.stringify(body) : '{}'});
    const j = await r.json();
    if (j.code === 0) return j.data;
    if (j.code === 40101) { localStorage.removeItem('token'); authToken = null; }
    return null;
  } catch(e) { console.error(e); return null; }
}

// ============ Router ============
function navigate(path) {
  currentRoute = path;
  window.location.hash = path;
  render();
  updateActiveNav();
  window.scrollTo(0, 0);
}

function updateActiveNav() {
  document.querySelectorAll('.nav-links a, .bottom-nav a').forEach(a => {
    const href = a.getAttribute('href') || '';
    a.classList.toggle('active', href === '#' + currentRoute || (currentRoute === '/' && href === '#/'));
  });
}

// ============ Pages ============
function render() {
  const app = document.getElementById('app');
  const pages = {
    '/': renderHome,
    '/almanac': renderAlmanac,
    '/qifu': renderQifu,
    '/lottery': renderLottery,
    '/bazi': renderBazi,
    '/dream': renderDream,
    '/meditation': renderMeditation,
    '/palmistry': renderPalmistry,
    '/naming': renderNaming,
    '/divination': renderDivination,
  };
  const fn = pages[currentRoute] || renderHome;
  fn(app);
}

function renderHome(el) {
  el.innerHTML = `
    <div class="almanac-header">
      <div style="font-size:3rem;margin-bottom:8px">🪷</div>
      <h1 class="font-display" style="font-size:2.5rem;background:linear-gradient(180deg,#f5e6b8,#c9a05c 50%,#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent">菩提苑</h1>
      <p style="color:var(--paper-dark);margin-top:8px;font-size:15px">心诚则灵 · 一念慈悲 · 福报自来</p>
    </div>
    <div class="card" style="margin-top:24px">
      <h2 class="font-display" style="font-size:1.5rem;color:var(--gold);margin-bottom:16px">🙏 为家人祈福</h2>
      <p style="color:var(--paper-dark);font-size:14px;margin-bottom:16px">点一盏灯，挂家人之名，愿心愿成就，福寿安康。</p>
      <button class="btn btn-primary" onclick="navigate('/qifu')">点亮一盏灯</button>
    </div>
    <div class="card">
      <h2 class="font-display" style="font-size:1.5rem;color:var(--gold);margin-bottom:16px">📅 今日黄历</h2>
      <div id="homeAlmanac"><div class="loading">加载中...</div></div>
      <button class="btn btn-secondary" style="margin-top:12px" onclick="navigate('/almanac')">查看完整黄历</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card" style="cursor:pointer" onclick="navigate('/lottery')">
        <div style="font-size:2rem;margin-bottom:8px">📜</div>
        <div class="font-display" style="font-size:1.2rem;color:var(--gold)">求灵签</div>
        <p style="font-size:12px;color:var(--paper-dark);margin-top:4px">心诚则灵</p>
      </div>
      <div class="card" style="cursor:pointer" onclick="navigate('/bazi')">
        <div style="font-size:2rem;margin-bottom:8px">☯️</div>
        <div class="font-display" style="font-size:1.2rem;color:var(--gold)">八字精批</div>
        <p style="font-size:12px;color:var(--paper-dark);margin-top:4px">洞悉天命</p>
      </div>
      <div class="card" style="cursor:pointer" onclick="navigate('/dream')">

function shiftDate(d) {
  const t = new Date(almanacDate);
  t.setDate(t.getDate()+d);
  almanacDate = t.toISOString().slice(0,10);
  loadAlmanac();
}

function getLevelColor(level) {
  const m = {'上上':'#e05555','上吉':'#e05555','中吉':'#c9a05c','中平':'#f5f0e8','下下':'rgba(184,168,138,.7)'};
  return m[level]||'#c9a05c';
}
function getLevelBorder(level) {
  const m = {'上上':'rgba(196,61,61,.4)','上吉':'rgba(196,61,61,.3)','中吉':'rgba(201,160,92,.4)','中平':'rgba(201,160,92,.2)','下下':'rgba(184,168,138,.2)'};
  return m[level]||'rgba(201,160,92,.3)';
}
function getLevelBg(level) {
  const m = {'上上':'rgba(196,61,61,.1)','上吉':'rgba(196,61,61,.05)','中吉':'rgba(201,160,92,.1)','中平':'rgba(44,35,24,.5)','下下':'rgba(184,168,138,.05)'};
  return m[level]||'rgba(201,160,92,.05)';
}

function playTrack(id, title, subtitle, icon, url, duration) {
  currentTrack = {id, title, subtitle, icon, url, duration};
  audio.src = url;
  audio.play();
  isPlaying = true;
  updatePlayer();
}

function updatePlayer() {
  const bar = document.getElementById('playerBar');
  if (!currentTrack) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  document.getElementById('playerIcon').textContent = currentTrack.icon;
  document.getElementById('playerTitle').textContent = currentTrack.title;
  document.getElementById('playerSubtitle').textContent = isPlaying ? '正在播放' : '已暂停';
  document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸' : '▶';
}

function togglePlay() {
  if (!currentTrack) return;
  if (isPlaying) { audio.pause(); } else { audio.play(); }
  isPlaying = !isPlaying;
  updatePlayer();
}

function stopMusic() {
  audio.pause();
  audio.currentTime = 0;
  currentTrack = null;
  isPlaying = false;
  updatePlayer();
}

function toggleMusic() {
  if (currentTrack) { togglePlay(); return; }
  if (tracks.length > 0) {
    const t = tracks[Math.floor(Math.random()*tracks.length)];
    playTrack(t.id, t.title, t.subtitle, t.icon, t.url, t.duration);
  }
}

audio.addEventListener('timeupdate', () => {
  if (currentTrack && currentTrack.duration) {
    const pct = (audio.currentTime / currentTrack.duration) * 100;
    document.getElementById('playerProgress').style.width = pct + '%';
  }
});

audio.addEventListener('ended', () => {
  if (tracks.length > 0) {
    const others = tracks.filter(t => !currentTrack || t.id !== currentTrack.id);
    const next = others[Math.floor(Math.random()*others.length)] || tracks[0];
    playTrack(next.id, next.title, next.subtitle, next.icon, next.url, next.duration);
  }
});
